name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "action.yaml"
permissions:
  contents: write

jobs:
  release:
    runs-on: action-summary
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: latest
          generate_release_notes: true
