name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "action.yaml"
permissions:
  contents: write

jobs:
  release:
    runs-on: action-summary
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: latest
          generate_release_notes: true
