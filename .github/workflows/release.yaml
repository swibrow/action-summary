name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "action.yaml"
permissions:
  contents: write

jobs:
  release:
    runs-on: action-summary
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: latest
          generate_release_notes: true
